allowCompoundWords: true
dictionaries:
  - cpp
  - cpp-compound-words
  - cpp-legacy
  - en_US
  - en-gb
  - fullstack
  - git
  - markdown
  - misc
  - npm
  - rust
  - rust-crates
  - shellscript
  - softwareTerms
enableGlobDot: true
features:
  weighted-suggestions: true
globRoot: ${cwd}
ignorePaths:
  - .*ignore
  - .git
  - .github/CODE_OF_CONDUCT.*
  - .vscode/extensions.json
  - Cargo.lock
  - target/**
ignoreRegExpList:
  - kuroné?
  # Ignore the entire Unicode fullwidth/halfwidth forms block.
  # Used by arming policy negative-test fixtures (e.g. ｃｌａｕｄｅ)
  # which intentionally must not arm. The directive below
  # silences cspell on the regex literal itself, which would
  # otherwise flag the embedded hex token inside the range.
  # cspell directives are honoured when cspell lints this YAML
  # file as content.
  # cspell:disable-next-line
  - '[\uff00-\uffef]+'
language: en,ja
useGitignore: true
version: '0.2'
words:
  # Renderer snapshots intentionally capture right-edge clipping, so
  # partial frame text can include these truncated word tails.
  - agen
  - aichat
  - asciinema
  - catppuccin
  - clau
  - claudex
  - clauder
  - decckm
  - embark
  - greppable
  - hsomething
  - illumos
  - kito
  - jvim
  - kyuukyuu
  - lossily
  - nyancat
  - ollama
  - pylint
  - qjunk
  - qorrection
  - queu
  - qwen
  - rexpect
  - sigcld
  - sigpoll
  - sigpwr
  - sigstkflt
  - sigunused
  - swatinem
  - toctou
  - unpushed
  - unreplied
  - ueue
  - xclaude
  - xcopilot
  # Oversized :wq snapshot right-edge clips (anim-large-art-contract path).
  - aceful
  - apot
  - enqu
  - eued
  - gracefu
  - initiati
  - momen
  - nstance
  - processi
