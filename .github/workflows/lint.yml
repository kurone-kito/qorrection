concurrency:
  # PR runs are grouped by PR number so a newer push supersedes the
  # older run. Non-PR runs (push to main, workflow_dispatch) get a
  # unique group keyed on run_id so they never cancel each other,
  # even under rapid merges or repeated manual dispatches.
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('run-{0}', github.run_id) }}
  cancel-in-progress: true
name: Linting workflow
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Run cspell
        uses: streetsidesoftware/cspell-action@v8
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
