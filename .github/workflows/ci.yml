concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
name: CI
on:
  push:
    branches:
      - '**'
      - '!main'
  pull_request:
permissions:
  contents: read
jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        # Install the channel pinned in rust-toolchain.toml together
        # with the components it declares. We pass the channel
        # explicitly because newer rustup releases require at least
        # one toolchain spec for `rustup toolchain install`.
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  test:
    name: Test (${{ matrix.os }})
    needs: [fmt, clippy, deny]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --verbose --all-targets
      - name: cargo test
        run: cargo test --verbose --all-targets
