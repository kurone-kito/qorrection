concurrency:
  cancel-in-progress: true
  # Dedupe push and pull_request runs for the same head ref. For
  # same-repo PRs, the `push` event uses `github.ref`
  # (refs/heads/<branch>) while the `pull_request` event uses
  # `github.event.pull_request.number`, so keying on either alone
  # leaves both runs alive. Key on the head repo + head branch (or
  # ref, for push events on `main` etc.) so duplicate runs collapse.
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref }}
name: CI
on:
  push:
    branches:
      - '**'
      - '!main'
  pull_request:
permissions:
  contents: read
jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        # Install the channel pinned in rust-toolchain.toml together
        # with the components it declares. We pass the channel
        # explicitly because newer rustup releases require at least
        # one toolchain spec for `rustup toolchain install`.
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  msrv:
    name: MSRV (Cargo.toml rust-version)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read MSRV from Cargo.toml
        id: msrv
        shell: bash
        run: |
          set -euo pipefail
          # Use cargo metadata so this stays correct under any future
          # workspace/inheritance changes and tolerates field reorder.
          # We need a Rust toolchain to invoke `cargo metadata`; the
          # currently installed one is fine (it does not affect MSRV).
          rustup toolchain install stable --profile minimal
          # Parse the metadata structurally and select the package
          # named `qorrection` so this keeps working if/when this
          # repository grows into a multi-package workspace. Failing
          # closed with an explicit diagnostic is preferred over the
          # previous grep+head pipeline, which would have silently
          # picked a workspace member's MSRV instead.
          version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c '
          import json
          import sys
          data = json.load(sys.stdin)
          pkg = next((p for p in data["packages"] if p["name"] == "qorrection"), None)
          if pkg is None:
              sys.exit("error: package \"qorrection\" not found in cargo metadata output")
          rv = pkg.get("rust_version")
          if not rv:
              sys.exit("error: package \"qorrection\" has no rust-version field")
          print(rv)
          ')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - name: Install MSRV toolchain
        run: rustup toolchain install ${{ steps.msrv.outputs.version }} --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv-${{ steps.msrv.outputs.version }}
      - name: cargo check on MSRV
        run: cargo +${{ steps.msrv.outputs.version }} check --locked --all-targets --all-features

  test:
    name: Test (${{ matrix.os }})
    needs: [fmt, clippy, deny]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        # `cargo test --all-targets` already builds every target, so
        # we skip a separate `cargo build` step. `--locked` keeps the
        # committed Cargo.lock authoritative — same constraint as the
        # release workflow — so a stale lockfile cannot pass CI.
        run: cargo test --locked --verbose --all-targets
