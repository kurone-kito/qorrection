name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
concurrency:
  # Tag pushes and manual dispatches must not race on the same
  # artifacts and the GitHub Release. We do NOT cancel in-flight
  # runs because canceling mid-publish could leave a partial
  # release.
  group: release-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  verify-tag:
    name: Verify tag matches Cargo.toml version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        # Pass the channel explicitly because newer rustup releases
        # require at least one toolchain spec for `rustup toolchain
        # install`. The channel here matches rust-toolchain.toml.
        run: rustup toolchain install stable --profile minimal
      - name: Compare Cargo.toml version with tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          # `cargo pkgid` prints `…#qorrection@<version>` (or the
          # legacy `…#<version>` form on older Cargo). Strip up to
          # and including the last `@` to get just the version. We
          # use the package id rather than `cargo metadata` because
          # it has no JSON parsing dependency.
          pkgid="$(cargo pkgid -p qorrection)"
          cargo_version="${pkgid##*@}"
          if [ "${cargo_version}" = "${pkgid}" ]; then
            # Older `cargo pkgid` style: strip up to last `#`.
            cargo_version="${pkgid##*#}"
          fi
          echo "tag=${tag}"
          echo "cargo=${cargo_version}"
          if [ "${tag}" != "${cargo_version}" ]; then
            echo "::error::Tag v${tag} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi
          if [ "${cargo_version}" = "0.0.0" ]; then
            echo "::error::Refusing to publish placeholder version 0.0.0" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: [verify-tag]
    # Allow manual dispatch (no tag) to still exercise the build matrix.
    if: |
      always() &&
      (needs.verify-tag.result == 'success' ||
       needs.verify-tag.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux uses musl targets so the published binary is fully
          # static and runs on any glibc/distribution baseline.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        # `rustup toolchain install` (with no args) reads
        # rust-toolchain.toml and installs the pinned channel
        # together with its declared components.
        run: |
          rustup toolchain install
          rustup target add ${{ matrix.target }}
      - name: Install cross-build tooling (linux)
        if: runner.os == 'Linux'
        # `cross` runs the build inside the cross-rs Docker image
        # for the requested target, which already ships a working
        # musl cross compiler and linker for both x86_64 and
        # aarch64 — no host apt packages required.
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build release binaries
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi
      - name: Verify Linux binaries are statically linked
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          for bin in qorrection q9; do
            path="target/${{ matrix.target }}/release/${bin}"
            file "${path}"
            if file "${path}" | grep -q "dynamically linked"; then
              echo "::error::${path} is dynamically linked" >&2
              exit 1
            fi
          done
      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          stage="qorrection-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/qorrection.exe" "dist/${stage}/"
            cp "target/${{ matrix.target }}/release/q9.exe" "dist/${stage}/"
          else
            cp "target/${{ matrix.target }}/release/qorrection" "dist/${stage}/"
            cp "target/${{ matrix.target }}/release/q9" "dist/${stage}/"
          fi
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${stage}/"
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${stage}.zip" "${stage}"
          else
            tar -czf "${stage}.tar.gz" "${stage}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: qorrection-${{ matrix.target }}
          path: dist/qorrection-*.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
