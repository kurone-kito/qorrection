name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        # `rustup show` reads rust-toolchain.toml and installs the
        # pinned channel (with declared components) if missing.
        run: |
          rustup show
          rustup target add ${{ matrix.target }}
      - name: Install cross-compilation tooling (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo "[target.aarch64-unknown-linux-gnu]"
            echo "linker = \"aarch64-linux-gnu-gcc\""
          } >> .cargo/config.toml
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          stage="qorrection-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/qorrection.exe" "dist/${stage}/"
            cp "target/${{ matrix.target }}/release/q9.exe" "dist/${stage}/"
          else
            cp "target/${{ matrix.target }}/release/qorrection" "dist/${stage}/"
            cp "target/${{ matrix.target }}/release/q9" "dist/${stage}/"
          fi
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${stage}/"
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${stage}.zip" "${stage}"
          else
            tar -czf "${stage}.tar.gz" "${stage}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: qorrection-${{ matrix.target }}
          path: dist/qorrection-*.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
