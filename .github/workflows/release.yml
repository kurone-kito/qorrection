name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  verify-tag:
    name: Verify tag matches Cargo.toml version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - name: Compare Cargo.toml version with tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          cargo_version="$(
            grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/'
          )"
          echo "tag=${tag}"
          echo "cargo=${cargo_version}"
          if [ "${tag}" != "${cargo_version}" ]; then
            echo "::error::Tag v${tag} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi
          if [ "${cargo_version}" = "0.0.0" ]; then
            echo "::error::Refusing to publish placeholder version 0.0.0" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: [verify-tag]
    # Allow manual dispatch (no tag) to still exercise the build matrix.
    if: |
      always() &&
      (needs.verify-tag.result == 'success' ||
       needs.verify-tag.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux uses musl targets so the published binary is fully
          # static and runs on any glibc/distribution baseline.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        # `rustup show` reads rust-toolchain.toml and installs the
        # pinned channel (with declared components) if missing.
        run: |
          rustup show
          rustup target add ${{ matrix.target }}
      - name: Install cross-compilation tooling (linux musl)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            mkdir -p .cargo
            {
              echo "[target.aarch64-unknown-linux-musl]"
              echo "linker = \"aarch64-linux-gnu-gcc\""
            } >> .cargo/config.toml
          fi
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Verify Linux binaries are statically linked
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          for bin in qorrection q9; do
            path="target/${{ matrix.target }}/release/${bin}"
            file "${path}"
            if file "${path}" | grep -q "dynamically linked"; then
              echo "::error::${path} is dynamically linked" >&2
              exit 1
            fi
          done
      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          stage="qorrection-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/qorrection.exe" "dist/${stage}/"
            cp "target/${{ matrix.target }}/release/q9.exe" "dist/${stage}/"
          else
            cp "target/${{ matrix.target }}/release/qorrection" "dist/${stage}/"
            cp "target/${{ matrix.target }}/release/q9" "dist/${stage}/"
          fi
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${stage}/"
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${stage}.zip" "${stage}"
          else
            tar -czf "${stage}.tar.gz" "${stage}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: qorrection-${{ matrix.target }}
          path: dist/qorrection-*.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
